name: Widget App Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.18.0'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run locale checks (warnings only)
      run: python3 ./scripts/check_locale_issues.py && python3 ./scripts/ci_warn_if_empty.py || true

    - name: Run linter
      run: npm run lint

    - name: Run typecheck
      run: npm run typecheck

    - name: Build
      run: npm run build

    - name: Run tests with coverage
      run: npm test -- --coverage

    - name: Security audit
      run: npm audit --audit-level=high || true

    - name: Check bundle size budgets
      run: npm run ci:size-limit || true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always()
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info
        flags: widget-app
        name: widget-app-coverage
      continue-on-error: true
